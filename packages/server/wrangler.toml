name = "weaver-sync"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Per-document relay Durable Object. SQLite-backed class so the free-tier /
# storage-billing path is available; state today is a single snapshot blob in
# DO storage (R2 cold snapshots are a Phase 2b follow-up).
[[durable_objects.bindings]]
name = "WEAVER_SYNC"
class_name = "WeaverSyncDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WeaverSyncDO"]

[observability]
enabled = true
