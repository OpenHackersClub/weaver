name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Astro check
        run: pnpm --filter @weaver/docs check

      - name: Build docs site
        run: pnpm --filter @weaver/docs build

      - name: Typecheck @weaver/core
        run: pnpm --filter @weaver/core typecheck

      - name: Typecheck @weaver/dom
        run: pnpm --filter @weaver/dom typecheck

      - name: Typecheck @weaver/react
        run: pnpm --filter @weaver/react typecheck

      - name: Build playground SPA
        run: pnpm --filter @weaver/playground build

      - name: Upload docs build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: apps/docs/dist
          retention-days: 7
          if-no-files-found: error

      - name: Upload playground build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: playground-dist
          path: apps/playground/dist
          retention-days: 7
          if-no-files-found: error

  unit-tests:
    name: Unit tests (flare-dispatch)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: openhackersclub/flare-dispatch-action@v1
        with:
          run: offload-test
          endpoint: ${{ vars.FLAREDISPATCH_ENDPOINT }}
          hmac-secret: ${{ secrets.FLAREDISPATCH_HMAC }}
          mode: await
          timeout: 15m
          inputs: |
            {
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "command": "pnpm test"
            }

  acceptance:
    name: Playwright acceptance (flare-dispatch CDP)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: openhackersclub/flare-dispatch-action@v1
        with:
          run: cdp-acceptance
          endpoint: ${{ vars.FLAREDISPATCH_ENDPOINT }}
          hmac-secret: ${{ secrets.FLAREDISPATCH_HMAC }}
          mode: await
          timeout: 30m
          inputs: |
            {
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "appBootCommand": "pnpm --filter @weaver/playground build && pnpm --filter @weaver/playground exec vite preview --host 0.0.0.0 --port 5181 --strictPort",
              "appPort": 5181,
              "testCommand": "pnpm --filter @weaver/playground test:acceptance:cdp"
            }
